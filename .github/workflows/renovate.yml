name: Renovate

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      log_level_debug:
        type: boolean
        description: "Run Renovate with DEBUG log level"
        default: false
      dry_run:
        type: boolean
        description: "Dry run (no PRs created)"
        default: false

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    name: Run self-hosted Renovate
    runs-on: ubuntu-24.04
    environment: Renovate
    permissions:
      contents: read
    steps:
      - name: Get token
        id: get_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        env:
          LOG_LEVEL: ${{ inputs.log_level_debug && 'debug' || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dry_run && 'full' || 'null' }}
          RENOVATE_AUTODISCOVER: "true"
        with:
          # renovate: datasource=github-releases depName=renovatebot/renovate
          renovate-version: 43.111.3
          configurationFile: renovate.json
          token: ${{ steps.get_token.outputs.token }}
