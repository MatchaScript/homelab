name: Build Bootc Images

on:
  schedule:
    # 毎週日曜日 午前2時(UTC) = 11時(JST)
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type to execute"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - base
          - hyperv
          - asahi
      push_images:
        description: "Push images to registry"
        required: true
        default: false
        type: boolean
      target_registry:
        description: "Target registry (override default)"
        required: false
        type: string
        default: "ghcr.io"

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  NAMESPACE: matchascript
  FEDORA_IMAGE: fedora-bootc
  ASAHI_IMAGE: asahi-bootc
  # renovate: datasource=docker depName=quay.io/fedora/fedora-bootc
  BOOTC_BASE: "quay.io/fedora/fedora-bootc:latest@sha256:b2cdac369040bc38f571251cc3063d6d9efbf1406938f4517b40b80171135627"
  CONTEXT_DIR: ./containers

jobs:
  # ════════════════════════════════════════════════════
  #  Prepare
  # ════════════════════════════════════════════════════
  prepare:
    name: Prepare Build Environment
    runs-on: ubuntu-24.04
    outputs:
      current_date: ${{ steps.set_date.outputs.current_date }}
      version_id: ${{ steps.get_version.outputs.version_id }}
      branch_name: ${{ steps.set_branch.outputs.branch_name }}
      registry: ${{ steps.set_registry.outputs.registry }}
      can_push: ${{ steps.set_push.outputs.can_push }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Podman
        uses: ./.github/actions/setup-podman

      - name: Set current date
        id: set_date
        env:
          TZ: "Asia/Tokyo"
        run: echo "current_date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Get VERSION_ID from bootc base image
        id: get_version
        run: |
          VERSION_ID=$(sudo podman run --rm ${{ env.BOOTC_BASE }} cat /etc/os-release | grep '^VERSION_ID=' | cut -d= -f2 | tr -d '"' 2>/dev/null || echo "")

          if [ -z "$VERSION_ID" ] || [ "$VERSION_ID" = "unknown" ]; then
            VERSION_ID=$(sudo podman inspect ${{ env.BOOTC_BASE }} --format='{{index .Config.Labels "org.opencontainers.image.version"}}' 2>/dev/null || echo "rawhide")
          fi

          if [ -z "$VERSION_ID" ] || [ "$VERSION_ID" = "<no value>" ] || [ "$VERSION_ID" = "unknown" ]; then
            VERSION_ID="rawhide"
          fi

          echo "version_id=$VERSION_ID" >> $GITHUB_OUTPUT
          echo "Detected VERSION_ID: $VERSION_ID"

      - name: Set branch name
        id: set_branch
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          BRANCH_NAME="${BRANCH_NAME//\//-}"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "Current branch: $BRANCH_NAME"

      - name: Set registry
        id: set_registry
        run: |
          REGISTRY="${{ inputs.target_registry || env.REGISTRY }}"
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT

      - name: Set push permission
        id: set_push
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          if [ "$BRANCH_NAME" = "main" ] || [ "$BRANCH_NAME" = "devel" ]; then
            echo "can_push=true" >> $GITHUB_OUTPUT
          else
            echo "can_push=false" >> $GITHUB_OUTPUT
          fi

  # ════════════════════════════════════════════════════
  #  Build fedora-bootc base — amd64 / arm64
  # ════════════════════════════════════════════════════
  build-base:
    name: Build fedora-bootc base (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: prepare
    if: ${{ inputs.build_type == 'all' || inputs.build_type == 'base' || github.event_name == 'schedule' }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Podman
        uses: ./.github/actions/setup-podman

      - name: Generate Tags
        id: tags
        uses: ./.github/actions/image-tags
        with:
          image_prefix: ${{ needs.prepare.outputs.registry }}/${{ env.NAMESPACE }}/${{ env.FEDORA_IMAGE }}
          branch: ${{ needs.prepare.outputs.branch_name }}
          date: ${{ needs.prepare.outputs.current_date }}
          version: ${{ needs.prepare.outputs.version_id }}
          arches: ${{ matrix.arch }}

      - name: Generate OCI labels
        id: labels
        uses: ./.github/actions/oci-labels
        with:
          title: ${{ env.FEDORA_IMAGE }}
          description: "Fedora bootc base image for a homelab cluster"
          version: "${{ needs.prepare.outputs.version_id }}.${{ needs.prepare.outputs.current_date }}"
          base_name: ${{ env.BOOTC_BASE }}

      - name: Build base image (podman)
        env:
          VERSION_ID: ${{ needs.prepare.outputs.version_id }}
          OCI_LABELS: ${{ steps.labels.outputs.labels }}
        run: |
          LABEL_ARGS=()
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            LABEL_ARGS+=(--label "$line")
          done <<< "$OCI_LABELS"

          sudo podman build \
            --platform linux/${{ matrix.arch }} \
            --security-opt=label=disable \
            --cap-add=all \
            --device /dev/fuse \
            --build-arg BOOTC_BASE="${{ env.BOOTC_BASE }}" \
            --build-arg VERSION_ID="${VERSION_ID}" \
            "${LABEL_ARGS[@]}" \
            --tag temp-base-${{ matrix.arch }} \
            -f ${{ env.CONTEXT_DIR }}/bootc/base/fedora.Containerfile \
            ${{ env.CONTEXT_DIR }}

      - name: Rechunk base image
        run: |
          sudo podman run \
            --rm --privileged \
            --security-opt=label=disable \
            -v /var/lib/containers:/var/lib/containers:z \
            quay.io/centos-bootc/centos-bootc:stream10 \
            /usr/libexec/bootc-base-imagectl rechunk \
            localhost/temp-base-${{ matrix.arch }}:latest localhost/rechunked-temp-base-${{ matrix.arch }}:latest
          sudo podman tag localhost/rechunked-temp-base-${{ matrix.arch }}:latest localhost/temp-base-${{ matrix.arch }}:latest
          sudo podman rmi localhost/rechunked-temp-base-${{ matrix.arch }}:latest

      - name: Login to registry
        if: ${{ (inputs.push_images == true || github.event_name == 'schedule') && needs.prepare.outputs.can_push == 'true' }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login -u "${{ github.actor }}" --password-stdin ${{ needs.prepare.outputs.registry }}

      - name: Tag and push
        if: ${{ (inputs.push_images == true || github.event_name == 'schedule') && needs.prepare.outputs.can_push == 'true' }}
        run: |
          for tag in $(echo "${{ steps.tags.outputs.tags }}" | tr ',' ' '); do
            sudo podman tag temp-base-${{ matrix.arch }} "${tag}"
            sudo podman push "${tag}"
            echo "Pushed: ${tag}"
          done

      - name: Sign pushed images (cosign keyless)
        if: ${{ (inputs.push_images == true || github.event_name == 'schedule') && needs.prepare.outputs.can_push == 'true' }}
        uses: ./.github/actions/cosign-sign
        with:
          references: ${{ steps.tags.outputs.tags }}
          registry: ${{ needs.prepare.outputs.registry }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}

  # ── fedora-bootc base multi-arch manifest ─────────────
  manifest-base:
    name: Create fedora-bootc base manifest
    runs-on: ubuntu-24.04
    needs: [prepare, build-base]
    if: ${{ (inputs.build_type == 'all' || inputs.build_type == 'base' || github.event_name == 'schedule') && (inputs.push_images == true || github.event_name == 'schedule') && needs.prepare.outputs.can_push == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Podman
        uses: ./.github/actions/setup-podman

      - name: Login to registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login -u "${{ github.actor }}" --password-stdin ${{ needs.prepare.outputs.registry }}

      - name: Generate Tags
        id: tags
        uses: ./.github/actions/image-tags
        with:
          image_prefix: ${{ needs.prepare.outputs.registry }}/${{ env.NAMESPACE }}/${{ env.FEDORA_IMAGE }}
          branch: ${{ needs.prepare.outputs.branch_name }}
          date: ${{ needs.prepare.outputs.current_date }}
          version: ${{ needs.prepare.outputs.version_id }}
          arches: "-"

      - name: Create and push multi-arch manifest
        env:
          IMAGE_PREFIX: ${{ needs.prepare.outputs.registry }}/${{ env.NAMESPACE }}/${{ env.FEDORA_IMAGE }}
          PRIMARY_KEY: ${{ steps.tags.outputs.primary_key }}
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          AMD64_IMAGE="${IMAGE_PREFIX}:${PRIMARY_KEY}-amd64"
          ARM64_IMAGE="${IMAGE_PREFIX}:${PRIMARY_KEY}-arm64"

          echo "Creating multi-arch manifest from: ${AMD64_IMAGE}, ${ARM64_IMAGE}"
          sudo podman manifest create base-manifest
          sudo podman manifest add base-manifest "docker://${AMD64_IMAGE}"
          sudo podman manifest add base-manifest "docker://${ARM64_IMAGE}"

          for tag in $(echo "${TAGS}" | tr ',' ' '); do
            echo "Pushing manifest as: ${tag}"
            sudo podman manifest push base-manifest "docker://${tag}"
          done

          sudo podman manifest rm base-manifest

      - name: Sign multi-arch manifest (cosign keyless)
        uses: ./.github/actions/cosign-sign
        with:
          references: ${{ steps.tags.outputs.tags }}
          registry: ${{ needs.prepare.outputs.registry }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════
  #  Build fedora-bootc hyperv variant — amd64 only
  # ════════════════════════════════════════════════════
  build-hyperv:
    name: Build fedora-bootc hyperv (amd64)
    runs-on: ubuntu-24.04
    needs: [prepare, manifest-base]
    if: ${{ (inputs.build_type == 'all' || inputs.build_type == 'hyperv' || github.event_name == 'schedule') && (inputs.push_images == true || github.event_name == 'schedule') && needs.prepare.outputs.can_push == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Podman
        uses: ./.github/actions/setup-podman

      - name: Generate Tags
        id: tags
        uses: ./.github/actions/image-tags
        with:
          image_prefix: ${{ needs.prepare.outputs.registry }}/${{ env.NAMESPACE }}/${{ env.FEDORA_IMAGE }}
          branch: ${{ needs.prepare.outputs.branch_name }}
          date: ${{ needs.prepare.outputs.current_date }}
          version: ${{ needs.prepare.outputs.version_id }}
          variant: hyperv
          arches: "amd64 -"

      - name: Generate OCI labels
        id: labels
        uses: ./.github/actions/oci-labels
        with:
          title: "${{ env.FEDORA_IMAGE }}-hyperv"
          description: "Fedora bootc image with Hyper-V guest integration services"
          version: "${{ needs.prepare.outputs.version_id }}.${{ needs.prepare.outputs.current_date }}"
          base_name: "${{ needs.prepare.outputs.registry }}/${{ env.NAMESPACE }}/${{ env.FEDORA_IMAGE }}"

      - name: Build hyperv image (podman)
        env:
          REGISTRY: ${{ needs.prepare.outputs.registry }}
          NAMESPACE: ${{ env.NAMESPACE }}
          IMAGE: ${{ env.FEDORA_IMAGE }}
          BRANCH_NAME: ${{ needs.prepare.outputs.branch_name }}
          VERSION_ID: ${{ needs.prepare.outputs.version_id }}
          OCI_LABELS: ${{ steps.labels.outputs.labels }}
        run: |
          LABEL_ARGS=()
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            LABEL_ARGS+=(--label "$line")
          done <<< "$OCI_LABELS"

          if [ "$BRANCH_NAME" = "main" ]; then
            BOOTC_BASE="${REGISTRY}/${NAMESPACE}/${IMAGE}:latest-amd64"
          else
            BOOTC_BASE="${REGISTRY}/${NAMESPACE}/${IMAGE}:${BRANCH_NAME}-amd64"
          fi
          echo "Using BOOTC_BASE=${BOOTC_BASE}"

          sudo podman build \
            --platform linux/amd64 \
            --security-opt=label=disable \
            --cap-add=all \
            --device /dev/fuse \
            --build-arg BOOTC_BASE="${BOOTC_BASE}" \
            --build-arg VERSION_ID="${VERSION_ID}" \
            "${LABEL_ARGS[@]}" \
            --tag temp-hyperv-amd64 \
            -f ${{ env.CONTEXT_DIR }}/bootc/extensions/hyper-v.Containerfile \
            ${{ env.CONTEXT_DIR }}

      - name: Login to registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login -u "${{ github.actor }}" --password-stdin ${{ needs.prepare.outputs.registry }}

      - name: Tag and push
        run: |
          for tag in $(echo "${{ steps.tags.outputs.tags }}" | tr ',' ' '); do
            sudo podman tag temp-hyperv-amd64 "${tag}"
            sudo podman push "${tag}"
            echo "Pushed: ${tag}"
          done

      - name: Sign pushed images (cosign keyless)
        uses: ./.github/actions/cosign-sign
        with:
          references: ${{ steps.tags.outputs.tags }}
          registry: ${{ needs.prepare.outputs.registry }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════
  #  Build asahi-bootc — arm64 only
  # ════════════════════════════════════════════════════
  build-asahi:
    name: Build asahi-bootc (arm64)
    runs-on: ubuntu-24.04-arm
    needs: prepare
    if: ${{ inputs.build_type == 'all' || inputs.build_type == 'asahi' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Podman
        uses: ./.github/actions/setup-podman

      - name: Generate Tags
        id: tags
        uses: ./.github/actions/image-tags
        with:
          image_prefix: ${{ needs.prepare.outputs.registry }}/${{ env.NAMESPACE }}/${{ env.ASAHI_IMAGE }}
          branch: ${{ needs.prepare.outputs.branch_name }}
          date: ${{ needs.prepare.outputs.current_date }}
          version: ${{ needs.prepare.outputs.version_id }}
          arches: "arm64 -"

      - name: Generate OCI labels
        id: labels
        uses: ./.github/actions/oci-labels
        with:
          title: ${{ env.ASAHI_IMAGE }}
          description: "Fedora Asahi bootc image for Apple Silicon (arm64)"
          version: "${{ needs.prepare.outputs.version_id }}.${{ needs.prepare.outputs.current_date }}"
          base_name: ${{ env.BOOTC_BASE }}

      - name: Build asahi image (podman)
        env:
          VERSION_ID: ${{ needs.prepare.outputs.version_id }}
          OCI_LABELS: ${{ steps.labels.outputs.labels }}
        run: |
          LABEL_ARGS=()
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            LABEL_ARGS+=(--label "$line")
          done <<< "$OCI_LABELS"

          sudo podman build \
            --platform linux/arm64 \
            --security-opt=label=disable \
            --cap-add=all \
            --device /dev/fuse \
            --build-arg BOOTC_BASE="${{ env.BOOTC_BASE }}" \
            --build-arg VERSION_ID="${VERSION_ID}" \
            "${LABEL_ARGS[@]}" \
            --tag temp-asahi \
            -f ${{ env.CONTEXT_DIR }}/bootc/base/asahi.Containerfile \
            ${{ env.CONTEXT_DIR }}

      - name: Rechunk asahi image
        run: |
          sudo podman run \
            --rm --privileged \
            --security-opt=label=disable \
            -v /var/lib/containers:/var/lib/containers:z \
            quay.io/centos-bootc/centos-bootc:stream10 \
            /usr/libexec/bootc-base-imagectl rechunk \
            localhost/temp-asahi:latest localhost/rechunked-temp-asahi:latest
          sudo podman tag localhost/rechunked-temp-asahi:latest localhost/temp-asahi:latest
          sudo podman rmi localhost/rechunked-temp-asahi:latest

      - name: Login to registry
        if: ${{ (inputs.push_images == true || github.event_name == 'schedule') && needs.prepare.outputs.can_push == 'true' }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login -u "${{ github.actor }}" --password-stdin ${{ needs.prepare.outputs.registry }}

      - name: Tag and push
        if: ${{ (inputs.push_images == true || github.event_name == 'schedule') && needs.prepare.outputs.can_push == 'true' }}
        run: |
          for tag in $(echo "${{ steps.tags.outputs.tags }}" | tr ',' ' '); do
            sudo podman tag temp-asahi "${tag}"
            sudo podman push "${tag}"
            echo "Pushed: ${tag}"
          done

      - name: Sign pushed images (cosign keyless)
        if: ${{ (inputs.push_images == true || github.event_name == 'schedule') && needs.prepare.outputs.can_push == 'true' }}
        uses: ./.github/actions/cosign-sign
        with:
          references: ${{ steps.tags.outputs.tags }}
          registry: ${{ needs.prepare.outputs.registry }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
