name: test(cnpg-cluster)

on:
  pull_request:
    paths:
      - 'charts/cnpg-cluster/**'
      - '.github/workflows/test-cnpg-cluster.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: helm lint + template
    runs-on: ubuntu-24.04
    env:
      PROMTOOL_VERSION: "3.0.1"
      YQ_VERSION: "v4.47.1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.16.2

      - name: Install yq + promtool
        run: |
          set -euo pipefail
          sudo curl -sSL -o /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
          yq --version

          tmp="$(mktemp -d)"
          curl -sSL \
            "https://github.com/prometheus/prometheus/releases/download/v${PROMTOOL_VERSION}/prometheus-${PROMTOOL_VERSION}.linux-amd64.tar.gz" \
            | tar -xz -C "$tmp"
          sudo install -m 0755 \
            "$tmp/prometheus-${PROMTOOL_VERSION}.linux-amd64/promtool" \
            /usr/local/bin/promtool
          promtool --version | head -1

      - name: helm lint + smoke template
        run: make -C charts/cnpg-cluster lint

      - name: PromQL validation
        run: make -C charts/cnpg-cluster lint-prom

  test-list:
    name: list test cases
    runs-on: ubuntu-24.04
    outputs:
      tests: ${{ steps.list.outputs.tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - id: list
        run: |
          cd charts/cnpg-cluster/test
          TESTS=$(find . -mindepth 1 -maxdepth 1 -type d -name '[0-9]*-*' -printf '%P\n' \
            | sort \
            | jq -cRn '{ include: [inputs | { test: "\(.)" }] }')
          echo "tests=${TESTS}" >> "$GITHUB_OUTPUT"
          echo "${TESTS}"

  test:
    name: ${{ matrix.test }}
    needs: [lint, test-list]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.test-list.outputs.tests) }}
    env:
      CHAINSAW_VERSION: v0.2.14
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.16.2

      - name: Install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5

      - name: Install kind + create cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: cnpg-cluster-test
          node_image: kindest/node:v1.34.3
          wait: 120s

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install Chainsaw
        uses: kyverno/action-install-chainsaw@1223ef75bedeb59c4e7b5455463d4316e76dff01 # v0.2.15
        with:
          verify: true

      - name: Install prerequisites (cert-manager, CNPG, plugin, MinIO)
        run: charts/cnpg-cluster/test/support/prereqs-install.sh

      - name: Run chainsaw test
        env:
          MATRIX_TEST: ${{ matrix.test }}
          CHART_DIR: ${{ github.workspace }}/charts/cnpg-cluster
        run: |
          chainsaw test \
            --config charts/cnpg-cluster/test/chainsaw.yaml \
            "charts/cnpg-cluster/test/${MATRIX_TEST}"

      - name: Dump cluster state on failure
        if: failure()
        run: |
          kubectl get clusters.postgresql.cnpg.io -A -o wide || true
          kubectl get backups.postgresql.cnpg.io -A -o wide || true
          kubectl get objectstores.barmancloud.cnpg.io -A -o wide || true
          kubectl logs -n cnpg-system deploy/cnpg-cloudnative-pg --tail=200 || true
          kubectl logs -n cnpg-system deploy/plugin-barman-cloud --tail=200 || true
