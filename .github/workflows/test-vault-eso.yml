name: test(vault-eso)

on:
  pull_request:
    paths:
      - 'charts/vault-eso/**'
      - '.github/workflows/test-vault-eso.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: helm lint + template
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.16.2

      - name: helm lint + smoke template
        run: make -C charts/vault-eso lint

  test-list:
    name: list test cases
    runs-on: ubuntu-24.04
    outputs:
      tests: ${{ steps.list.outputs.tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - id: list
        run: |
          cd charts/vault-eso/test
          TESTS=$(find . -mindepth 1 -maxdepth 1 -type d -name '[0-9]*-*' -printf '%P\n' \
            | sort \
            | jq -cRn '{ include: [inputs | { test: "\(.)" }] }')
          echo "tests=${TESTS}" >> "$GITHUB_OUTPUT"
          echo "${TESTS}"

  test:
    name: ${{ matrix.test }}
    needs: [lint, test-list]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.test-list.outputs.tests) }}
    env:
      CHAINSAW_VERSION: v0.2.15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.16.2

      - name: Install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5

      - name: Install kind + create cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: vault-eso-test
          node_image: kindest/node:v1.34.3
          wait: 120s

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install Chainsaw
        uses: kyverno/action-install-chainsaw@1223ef75bedeb59c4e7b5455463d4316e76dff01 # v0.2.15
        with:
          verify: true

      - name: Install prerequisites (external-secrets, Vault dev mode)
        run: charts/vault-eso/test/support/prereqs-install.sh

      - name: Run chainsaw test
        env:
          MATRIX_TEST: ${{ matrix.test }}
          CHART_DIR: ${{ github.workspace }}/charts/vault-eso
        run: |
          chainsaw test \
            --config charts/vault-eso/test/chainsaw.yaml \
            "charts/vault-eso/test/${MATRIX_TEST}"

      - name: Dump cluster state on failure
        if: failure()
        run: |
          kubectl get secretstores.external-secrets.io -A -o wide || true
          kubectl get externalsecrets.external-secrets.io -A -o wide || true
          kubectl get secrets -A || true
          kubectl logs -n external-secrets -l app.kubernetes.io/name=external-secrets --tail=200 || true
          kubectl logs -n vault statefulset/vault --tail=200 || true
          kubectl get pods -A -o wide || true
