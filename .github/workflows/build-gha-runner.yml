name: Build ARC Runner Images

on:
  schedule:
    # 毎週日曜日 午前2時(UTC) = 11時(JST)
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push images to registry"
        required: true
        default: false
        type: boolean
      target_registry:
        description: "Target registry (override default)"
        required: false
        type: string
        default: "ghcr.io"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  NAMESPACE: matchascript
  SLIM_IMAGE: gha-runner-slim
  DEFAULT_IMAGE: gha-runner
  FEDORA_BASE: "ghcr.io/matchascript/fedora:latest"
  CONTEXT_DIR: ./containers

jobs:
  # ════════════════════════════════════════════════════
  #  Prepare
  # ════════════════════════════════════════════════════
  prepare:
    name: Prepare Build Environment
    runs-on: ubuntu-24.04
    outputs:
      current_date: ${{ steps.set_date.outputs.current_date }}
      branch_name: ${{ steps.set_branch.outputs.branch_name }}
      registry: ${{ steps.set_registry.outputs.registry }}
      can_push: ${{ steps.set_push.outputs.can_push }}
    steps:
      - uses: actions/checkout@v4

      - name: Set current date
        id: set_date
        env:
          TZ: "Asia/Tokyo"
        run: echo "current_date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Set branch name
        id: set_branch
        run: |
          # Sanitize branch name for use as OCI tag (replace '/' with '-')
          BRANCH_NAME="${{ github.ref_name }}"
          BRANCH_NAME="${BRANCH_NAME//\//-}"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "Current branch: $BRANCH_NAME"

      - name: Set registry
        id: set_registry
        run: |
          REGISTRY="${{ inputs.target_registry || env.REGISTRY }}"
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT

      - name: Set push permission
        id: set_push
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          if [ "$BRANCH_NAME" = "main" ] || [ "$BRANCH_NAME" = "devel" ]; then
            echo "can_push=true" >> $GITHUB_OUTPUT
          else
            echo "can_push=false" >> $GITHUB_OUTPUT
          fi

  # ════════════════════════════════════════════════════
  #  Build Slim — amd64 / arm64
  # ════════════════════════════════════════════════════
  build-slim:
    name: Build Runner Slim (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install newer podman (from Debian trixie)
        run: |
          sudo apt-get install -y debian-archive-keyring
          echo 'deb [signed-by=/usr/share/keyrings/debian-archive-keyring.gpg] https://ftp.debian.org/debian/ trixie main' | sudo tee /etc/apt/sources.list.d/trixie.list
          sudo apt-get update
          sudo apt-get install -y crun/trixie podman/trixie

      - name: Generate Tags
        id: tags
        env:
          REGISTRY: ${{ needs.prepare.outputs.registry }}
          NAMESPACE: ${{ env.NAMESPACE }}
          IMAGE: ${{ env.SLIM_IMAGE }}
          DATE_TAG: ${{ needs.prepare.outputs.current_date }}
          BRANCH_NAME: ${{ needs.prepare.outputs.branch_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          IMAGE_PREFIX="${REGISTRY}/${NAMESPACE}/${IMAGE}"
          if [ "$BRANCH_NAME" = "main" ]; then
            TAGS="${IMAGE_PREFIX}:${DATE_TAG}-${ARCH},${IMAGE_PREFIX}:latest-${ARCH}"
          else
            TAGS="${IMAGE_PREFIX}:${DATE_TAG}-${BRANCH_NAME}-${ARCH},${IMAGE_PREFIX}:${BRANCH_NAME}-${ARCH}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "Generated tags: $TAGS"

      - name: Build slim image (podman)
        run: |
          sudo podman build \
            --platform linux/${{ matrix.arch }} \
            --security-opt=label=disable \
            --cap-add=all \
            --device /dev/fuse \
            --build-arg BASE_IMAGE=${{ env.FEDORA_BASE }} \
            --build-arg TARGETARCH=${{ matrix.arch }} \
            --tag temp-slim-${{ matrix.arch }} \
            -f ${{ env.CONTEXT_DIR }}/gha-runner/base.Containerfile \
            ${{ env.CONTEXT_DIR }}

      - name: Test image
        run: |
          IMAGE="localhost/temp-slim-${{ matrix.arch }}"
          echo "Testing image: ${IMAGE}"
          sudo podman run --rm --entrypoint /bin/sh "${IMAGE}" -c '
            set -e
            test -x /home/runner/run.sh
            node --version
            git --version
            jq --version
            curl --version
            uv --version
            skopeo --version
            id | grep -q "uid=1001"
            id | grep -q "docker"
            grep runner /etc/subuid | wc -l | grep -q 2
          '

      - name: Login to registry
        if: ${{ (inputs.push_images == true || github.event_name == 'schedule') && needs.prepare.outputs.can_push == 'true' }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login -u "${{ github.actor }}" --password-stdin ${{ needs.prepare.outputs.registry }}

      - name: Tag and push
        if: ${{ (inputs.push_images == true || github.event_name == 'schedule') && needs.prepare.outputs.can_push == 'true' }}
        run: |
          for tag in $(echo "${{ steps.tags.outputs.tags }}" | tr ',' ' '); do
            sudo podman tag temp-slim-${{ matrix.arch }} "${tag}"
            sudo podman push "${tag}"
            echo "Pushed: ${tag}"
          done

  # ── Slim multi-arch manifest ──────────────────────────
  manifest-slim:
    name: Create Slim Manifest
    runs-on: ubuntu-24.04
    needs: [prepare, build-slim]
    if: ${{ (inputs.push_images == true || github.event_name == 'schedule') && needs.prepare.outputs.can_push == 'true' }}
    steps:
      - name: Install newer podman (from Debian trixie)
        run: |
          sudo apt-get install -y debian-archive-keyring
          echo 'deb [signed-by=/usr/share/keyrings/debian-archive-keyring.gpg] https://ftp.debian.org/debian/ trixie main' | sudo tee /etc/apt/sources.list.d/trixie.list
          sudo apt-get update
          sudo apt-get install -y crun/trixie podman/trixie

      - name: Login to registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login -u "${{ github.actor }}" --password-stdin ${{ needs.prepare.outputs.registry }}

      - name: Create and push multi-arch manifest
        env:
          REGISTRY: ${{ needs.prepare.outputs.registry }}
          NAMESPACE: ${{ env.NAMESPACE }}
          IMAGE: ${{ env.SLIM_IMAGE }}
          DATE_TAG: ${{ needs.prepare.outputs.current_date }}
          BRANCH_NAME: ${{ needs.prepare.outputs.branch_name }}
        run: |
          IMAGE_PREFIX="${REGISTRY}/${NAMESPACE}/${IMAGE}"
          if [ "$BRANCH_NAME" = "main" ]; then
            AMD64_IMAGE="${IMAGE_PREFIX}:${DATE_TAG}-amd64"
            ARM64_IMAGE="${IMAGE_PREFIX}:${DATE_TAG}-arm64"
            TAGS="${IMAGE_PREFIX}:${DATE_TAG} ${IMAGE_PREFIX}:latest"
          else
            AMD64_IMAGE="${IMAGE_PREFIX}:${DATE_TAG}-${BRANCH_NAME}-amd64"
            ARM64_IMAGE="${IMAGE_PREFIX}:${DATE_TAG}-${BRANCH_NAME}-arm64"
            TAGS="${IMAGE_PREFIX}:${DATE_TAG}-${BRANCH_NAME} ${IMAGE_PREFIX}:${BRANCH_NAME}"
          fi

          echo "Creating multi-arch manifest from: ${AMD64_IMAGE}, ${ARM64_IMAGE}"
          sudo podman manifest create slim-manifest
          sudo podman manifest add slim-manifest "docker://${AMD64_IMAGE}"
          sudo podman manifest add slim-manifest "docker://${ARM64_IMAGE}"

          for tag in ${TAGS}; do
            echo "Pushing manifest as: ${tag}"
            sudo podman manifest push slim-manifest "docker://${tag}"
          done

          sudo podman manifest rm slim-manifest

  # ════════════════════════════════════════════════════
  #  Build Default — amd64 / arm64
  # ════════════════════════════════════════════════════
  build-default:
    name: Build Runner Default (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [prepare, manifest-slim]
    if: ${{ (inputs.push_images == true || github.event_name == 'schedule') && needs.prepare.outputs.can_push == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install newer podman (from Debian trixie)
        run: |
          sudo apt-get install -y debian-archive-keyring
          echo 'deb [signed-by=/usr/share/keyrings/debian-archive-keyring.gpg] https://ftp.debian.org/debian/ trixie main' | sudo tee /etc/apt/sources.list.d/trixie.list
          sudo apt-get update
          sudo apt-get install -y crun/trixie podman/trixie

      - name: Generate Tags
        id: tags
        env:
          REGISTRY: ${{ needs.prepare.outputs.registry }}
          NAMESPACE: ${{ env.NAMESPACE }}
          IMAGE: ${{ env.DEFAULT_IMAGE }}
          DATE_TAG: ${{ needs.prepare.outputs.current_date }}
          BRANCH_NAME: ${{ needs.prepare.outputs.branch_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          IMAGE_PREFIX="${REGISTRY}/${NAMESPACE}/${IMAGE}"
          if [ "$BRANCH_NAME" = "main" ]; then
            TAGS="${IMAGE_PREFIX}:${DATE_TAG}-${ARCH},${IMAGE_PREFIX}:latest-${ARCH}"
            SLIM_BASE_TAG="latest-${ARCH}"
          else
            TAGS="${IMAGE_PREFIX}:${DATE_TAG}-${BRANCH_NAME}-${ARCH},${IMAGE_PREFIX}:${BRANCH_NAME}-${ARCH}"
            SLIM_BASE_TAG="${BRANCH_NAME}-${ARCH}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "slim_base_tag=$SLIM_BASE_TAG" >> $GITHUB_OUTPUT

      - name: Login to registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login -u "${{ github.actor }}" --password-stdin ${{ needs.prepare.outputs.registry }}

      - name: Build default image (podman)
        env:
          REGISTRY: ${{ needs.prepare.outputs.registry }}
          NAMESPACE: ${{ env.NAMESPACE }}
          SLIM_IMAGE: ${{ env.SLIM_IMAGE }}
          SLIM_BASE_TAG: ${{ steps.tags.outputs.slim_base_tag }}
        run: |
          BASE_IMAGE="${REGISTRY}/${NAMESPACE}/${SLIM_IMAGE}:${SLIM_BASE_TAG}"
          echo "Using BASE_IMAGE=${BASE_IMAGE}"
          sudo podman build \
            --platform linux/${{ matrix.arch }} \
            --security-opt=label=disable \
            --cap-add=all \
            --device /dev/fuse \
            --build-arg BASE_IMAGE="${BASE_IMAGE}" \
            --tag temp-default-${{ matrix.arch }} \
            -f ${{ env.CONTEXT_DIR }}/gha-runner/default.Containerfile \
            ${{ env.CONTEXT_DIR }}

      - name: Test image
        run: |
          IMAGE="localhost/temp-default-${{ matrix.arch }}"
          echo "Testing image: ${IMAGE}"
          sudo podman run --rm --entrypoint /bin/sh "${IMAGE}" -c '
            set -e
            gcc --version
            g++ --version
            cmake --version
            make --version
            python3 --version
            shellcheck --version
            yamllint --version
            rsync --version
            ssh -V
          '

      - name: Tag and push
        run: |
          for tag in $(echo "${{ steps.tags.outputs.tags }}" | tr ',' ' '); do
            sudo podman tag temp-default-${{ matrix.arch }} "${tag}"
            sudo podman push "${tag}"
            echo "Pushed: ${tag}"
          done

  # ── Default multi-arch manifest ───────────────────────
  manifest-default:
    name: Create Default Manifest
    runs-on: ubuntu-24.04
    needs: [prepare, build-default]
    if: ${{ (inputs.push_images == true || github.event_name == 'schedule') && needs.prepare.outputs.can_push == 'true' }}
    steps:
      - name: Install newer podman (from Debian trixie)
        run: |
          sudo apt-get install -y debian-archive-keyring
          echo 'deb [signed-by=/usr/share/keyrings/debian-archive-keyring.gpg] https://ftp.debian.org/debian/ trixie main' | sudo tee /etc/apt/sources.list.d/trixie.list
          sudo apt-get update
          sudo apt-get install -y crun/trixie podman/trixie

      - name: Login to registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login -u "${{ github.actor }}" --password-stdin ${{ needs.prepare.outputs.registry }}

      - name: Create and push multi-arch manifest
        env:
          REGISTRY: ${{ needs.prepare.outputs.registry }}
          NAMESPACE: ${{ env.NAMESPACE }}
          IMAGE: ${{ env.DEFAULT_IMAGE }}
          DATE_TAG: ${{ needs.prepare.outputs.current_date }}
          BRANCH_NAME: ${{ needs.prepare.outputs.branch_name }}
        run: |
          IMAGE_PREFIX="${REGISTRY}/${NAMESPACE}/${IMAGE}"
          if [ "$BRANCH_NAME" = "main" ]; then
            AMD64_IMAGE="${IMAGE_PREFIX}:${DATE_TAG}-amd64"
            ARM64_IMAGE="${IMAGE_PREFIX}:${DATE_TAG}-arm64"
            TAGS="${IMAGE_PREFIX}:${DATE_TAG} ${IMAGE_PREFIX}:latest"
          else
            AMD64_IMAGE="${IMAGE_PREFIX}:${DATE_TAG}-${BRANCH_NAME}-amd64"
            ARM64_IMAGE="${IMAGE_PREFIX}:${DATE_TAG}-${BRANCH_NAME}-arm64"
            TAGS="${IMAGE_PREFIX}:${DATE_TAG}-${BRANCH_NAME} ${IMAGE_PREFIX}:${BRANCH_NAME}"
          fi

          echo "Creating multi-arch manifest from: ${AMD64_IMAGE}, ${ARM64_IMAGE}"
          sudo podman manifest create default-manifest
          sudo podman manifest add default-manifest "docker://${AMD64_IMAGE}"
          sudo podman manifest add default-manifest "docker://${ARM64_IMAGE}"

          for tag in ${TAGS}; do
            echo "Pushing manifest as: ${tag}"
            sudo podman manifest push default-manifest "docker://${tag}"
          done

          sudo podman manifest rm default-manifest
