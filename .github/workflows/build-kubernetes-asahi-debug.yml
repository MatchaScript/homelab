name: Build Kubernetes Asahi Debug Image

on:
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push images to registry"
        required: true
        default: false
        type: boolean
      target_registry:
        description: "Target registry (override default)"
        required: false
        type: string
        default: "ghcr.io"

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  NAMESPACE: matchascript
  IMAGE: kubernetes-asahi-debug
  # renovate: datasource=docker depName=ghcr.io/matchascript/kubernetes
  SYSBASE: "ghcr.io/matchascript/kubernetes:latest-asahi"
  CONTEXT_DIR: ./containers

jobs:
  # ════════════════════════════════════════════════════
  #  Prepare
  # ════════════════════════════════════════════════════
  prepare:
    name: Prepare Build Environment
    runs-on: ubuntu-24.04
    outputs:
      current_date: ${{ steps.set_date.outputs.current_date }}
      branch_name: ${{ steps.set_branch.outputs.branch_name }}
      registry: ${{ steps.set_registry.outputs.registry }}
      can_push: ${{ steps.set_push.outputs.can_push }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set current date
        id: set_date
        env:
          TZ: "Asia/Tokyo"
        run: echo "current_date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Set branch name
        id: set_branch
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          BRANCH_NAME="${BRANCH_NAME//\//-}"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "Current branch: $BRANCH_NAME"

      - name: Set registry
        id: set_registry
        run: |
          REGISTRY="${{ inputs.target_registry || env.REGISTRY }}"
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT

      - name: Set push permission
        id: set_push
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          if [ "$BRANCH_NAME" = "main" ] || [ "$BRANCH_NAME" = "devel" ]; then
            echo "can_push=true" >> $GITHUB_OUTPUT
          else
            echo "can_push=false" >> $GITHUB_OUTPUT
          fi

  # ════════════════════════════════════════════════════
  #  Build kubernetes-asahi-debug — arm64 only
  # ════════════════════════════════════════════════════
  build-debug:
    name: Build kubernetes-asahi-debug (arm64)
    runs-on: ubuntu-24.04-arm
    needs: prepare
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Podman
        uses: ./.github/actions/setup-podman

      - name: Generate Tags
        id: tags
        uses: ./.github/actions/image-tags
        with:
          image_prefix: ${{ needs.prepare.outputs.registry }}/${{ env.NAMESPACE }}/${{ env.IMAGE }}
          branch: ${{ needs.prepare.outputs.branch_name }}
          date: ${{ needs.prepare.outputs.current_date }}
          arches: "arm64 -"

      - name: Generate OCI labels
        id: labels
        uses: ./.github/actions/oci-labels
        with:
          title: ${{ env.IMAGE }}
          description: "Kubernetes-asahi bootc image with debug/instrumentation tooling (atc.c out-of-tree rebuild tooling)"
          version: "${{ needs.prepare.outputs.current_date }}"
          base_name: ${{ env.SYSBASE }}

      - name: Build debug image (podman)
        env:
          OCI_LABELS: ${{ steps.labels.outputs.labels }}
        run: |
          LABEL_ARGS=()
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            LABEL_ARGS+=(--label "$line")
          done <<< "$OCI_LABELS"

          sudo podman build \
            --platform linux/arm64 \
            --security-opt=label=disable \
            --cap-add=all \
            --device /dev/fuse \
            --build-arg SYSBASE="${{ env.SYSBASE }}" \
            "${LABEL_ARGS[@]}" \
            --tag temp-kubernetes-asahi-debug \
            -f ${{ env.CONTEXT_DIR }}/bootc/debug/asahi.Containerfile \
            ${{ env.CONTEXT_DIR }}

      - name: Rechunk debug image
        run: |
          sudo podman run \
            --rm --privileged \
            --security-opt=label=disable \
            -v /var/lib/containers:/var/lib/containers:z \
            quay.io/centos-bootc/centos-bootc:stream10 \
            /usr/libexec/bootc-base-imagectl rechunk \
            localhost/temp-kubernetes-asahi-debug:latest localhost/rechunked-temp-kubernetes-asahi-debug:latest
          sudo podman tag localhost/rechunked-temp-kubernetes-asahi-debug:latest localhost/temp-kubernetes-asahi-debug:latest
          sudo podman rmi localhost/rechunked-temp-kubernetes-asahi-debug:latest

      - name: Login to registry
        if: ${{ inputs.push_images == true && needs.prepare.outputs.can_push == 'true' }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login -u "${{ github.actor }}" --password-stdin ${{ needs.prepare.outputs.registry }}

      - name: Tag and push
        if: ${{ inputs.push_images == true && needs.prepare.outputs.can_push == 'true' }}
        run: |
          for tag in $(echo "${{ steps.tags.outputs.tags }}" | tr ',' ' '); do
            sudo podman tag temp-kubernetes-asahi-debug "${tag}"
            sudo podman push "${tag}"
            echo "Pushed: ${tag}"
          done

      - name: Sign pushed images (cosign keyless)
        if: ${{ inputs.push_images == true && needs.prepare.outputs.can_push == 'true' }}
        uses: ./.github/actions/cosign-sign
        with:
          references: ${{ steps.tags.outputs.tags }}
          registry: ${{ needs.prepare.outputs.registry }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
