name: Verify Base Images

# Gate for base-image digest bumps (e.g. Renovate updating quay.io/fedora/fedora-bootc).
# Upstream rolling tags such as :latest are rebuilt often and old digests get
# garbage-collected, so a pinned @sha256 can rot ("manifest unknown") before the
# weekly build runs. This builds the bootc base from the pinned digest and runs the
# resulting container, so a rotted digest (or a broken base) fails the PR check
# instead of the scheduled build.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-base-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-base:
    name: Verify bootc base builds and runs
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Detect base-image changes
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_SHA:-}" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "${BASE_SHA}" HEAD \
            | grep -qE '^(\.github/workflows/build-bootc\.yml|\.github/workflows/build-kubernetes\.yml|\.github/actions/setup-podman/|containers/bootc/base/|containers/overlay\.d/)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No base-image changes in this PR; nothing to verify."
          fi

      - name: Extract pinned BOOTC_BASE
        id: base
        if: steps.changes.outputs.relevant == 'true'
        run: |
          set -euo pipefail
          REF=$(grep -oE 'quay\.io/fedora/fedora-bootc:[^"[:space:]]+' \
            .github/workflows/build-bootc.yml | head -1)
          if [ -z "$REF" ]; then
            echo "::error::Could not find BOOTC_BASE in build-bootc.yml"
            exit 1
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "BOOTC_BASE = $REF"

      - name: Setup Podman
        if: steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/setup-podman

      - name: Build fedora-bootc base (amd64, no push)
        if: >-
          steps.changes.outputs.relevant == 'true'
          && (github.event_name == 'workflow_dispatch'
          || github.event.pull_request.head.repo.full_name == github.repository)
        env:
          BOOTC_BASE: ${{ steps.base.outputs.ref }}
        run: |
          set -euo pipefail
          sudo podman build \
            --platform linux/amd64 \
            --security-opt=label=disable \
            --cap-add=all \
            --device /dev/fuse \
            --build-arg BOOTC_BASE="${BOOTC_BASE}" \
            --build-arg VERSION_ID="ci" \
            --tag verify-base:amd64 \
            -f ./containers/bootc/base/fedora.Containerfile \
            ./containers

      - name: Smoke test the built container
        if: >-
          steps.changes.outputs.relevant == 'true'
          && (github.event_name == 'workflow_dispatch'
          || github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          set -euo pipefail
          echo "--- /etc/os-release ---"
          VID=$(sudo podman run --rm verify-base:amd64 \
            cat /etc/os-release | grep '^VERSION_ID=' | cut -d= -f2 | tr -d '"')
          echo "VERSION_ID=$VID"
          [ -n "$VID" ] || { echo "::error::VERSION_ID is empty"; exit 1; }
          echo "--- bootc --version ---"
          sudo podman run --rm verify-base:amd64 bootc --version
