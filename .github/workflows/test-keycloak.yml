name: test(keycloak)

on:
  pull_request:
    paths:
      - 'charts/keycloak/**'
      - 'charts/cnpg-cluster/**'
      - '.github/workflows/test-keycloak.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: helm lint + template
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.16.2

      - name: helm lint + smoke template
        run: make -C charts/keycloak lint

  test-list:
    name: list test cases
    runs-on: ubuntu-24.04
    outputs:
      tests: ${{ steps.list.outputs.tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - id: list
        run: |
          cd charts/keycloak/test
          TESTS=$(find . -mindepth 1 -maxdepth 1 -type d -name '[0-9]*-*' -printf '%P\n' \
            | sort \
            | jq -cRn '{ include: [inputs | { test: "\(.)" }] }')
          echo "tests=${TESTS}" >> "$GITHUB_OUTPUT"
          echo "${TESTS}"

  test:
    name: ${{ matrix.test }}
    needs: [lint, test-list]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.test-list.outputs.tests) }}
    env:
      CHAINSAW_VERSION: v0.2.14
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.16.2

      - name: Install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5

      - name: Install kind + create cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: keycloak-test
          node_image: kindest/node:v1.34.3
          wait: 120s

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Install Chainsaw
        uses: kyverno/action-install-chainsaw@06560d18422209e9c1e08e931d477d04bf2674c1 # v0.2.14
        with:
          verify: true

      - name: Install prerequisites (cert-manager, CNPG, ingress-nginx)
        run: charts/keycloak/test/support/prereqs-install.sh

      - name: Run chainsaw test
        env:
          MATRIX_TEST: ${{ matrix.test }}
          CHART_DIR: ${{ github.workspace }}/charts/keycloak
        run: |
          chainsaw test \
            --config charts/keycloak/test/chainsaw.yaml \
            "charts/keycloak/test/${MATRIX_TEST}"

      - name: Dump cluster state on failure
        if: failure()
        run: |
          kubectl get clusters.postgresql.cnpg.io -A -o wide || true
          kubectl get deployments -A -o wide || true
          kubectl get ingress -A -o wide || true
          kubectl logs -n cnpg-system deploy/cnpg-cloudnative-pg --tail=200 || true
          kubectl logs -n ingress-nginx -l app.kubernetes.io/name=ingress-nginx --tail=200 || true
          kubectl get pods -A -o wide || true
