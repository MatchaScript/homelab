---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: scheduled-cnpg-cluster
status:
  readyInstances: 1
  phase: Cluster in healthy state
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: scheduled-cnpg-cluster-every-minute
spec:
  cluster:
    name: scheduled-cnpg-cluster
  immediate: true
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
