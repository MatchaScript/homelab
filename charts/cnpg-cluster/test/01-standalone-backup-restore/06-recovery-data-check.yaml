apiVersion: batch/v1
kind: Job
metadata:
  name: recovery-from-backup-data-check
spec:
  backoffLimit: 3
  template:
    metadata:
      name: recovery-from-backup-data-check
    spec:
      restartPolicy: Never
      containers:
        - name: psql
          image: ghcr.io/cloudnative-pg/postgresql:16
          env:
            - name: PGURI
              valueFrom:
                secretKeyRef:
                  name: recovery-from-backup-cnpg-cluster-app
                  key: uri
          command: ["bash", "-c"]
          args:
            - |
              set -eu
              # The recovered cluster MUST contain the pre-backup row.
              # We do NOT assert post-backup rows are absent: without a
              # recoveryTarget, CNPG replays available WAL to the end, so
              # post-backup writes that were archived before the recovery
              # legitimately surface here. PITR semantics are not in scope
              # for this test.
              PRE=$(psql -At "$PGURI" -c "SELECT count(*) FROM test_rows WHERE phase='pre-backup';")
              POST=$(psql -At "$PGURI" -c "SELECT count(*) FROM test_rows WHERE phase='post-backup';")
              echo "pre-backup=${PRE} post-backup=${POST}"
              test "${PRE}" = "1"
