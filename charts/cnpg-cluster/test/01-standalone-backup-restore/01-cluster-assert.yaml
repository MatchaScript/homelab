---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: standalone-cnpg-cluster
spec:
  instances: 2
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: standalone-cnpg-cluster-backup
status:
  readyInstances: 2
  phase: Cluster in healthy state
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: standalone-cnpg-cluster-backup
spec:
  configuration:
    destinationPath: "s3://mybucket/standalone"
    endpointURL: "http://minio.minio.svc.cluster.local"
    s3Credentials:
      accessKeyId:
        name: standalone-cnpg-cluster-backup
        key: AWS_ACCESS_KEY_ID
      secretAccessKey:
        name: standalone-cnpg-cluster-backup
        key: AWS_SECRET_ACCESS_KEY
  retentionPolicy: "7d"
