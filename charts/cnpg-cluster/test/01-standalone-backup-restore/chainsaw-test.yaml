apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: standalone-backup-restore
spec:
  timeouts:
    apply: 30s
    assert: 8m
    cleanup: 2m
  steps:
    - name: Clear the MinIO bucket
      try:
        - apply:
            file: ./00-minio-cleanup.yaml
        - assert:
            file: ./00-minio-cleanup-assert.yaml
      catch:
        - describe:
            apiVersion: batch/v1
            kind: Job
        - podLogs:
            selector: batch.kubernetes.io/job-name=minio-cleanup

    - name: Install the standalone cluster
      try:
        - script:
            content: |
              set -eu
              "${CHART_DIR}/test/support/s3-secret.sh" "${NAMESPACE}" standalone-cnpg-cluster-backup
              helm upgrade --install standalone "${CHART_DIR}" \
                --namespace "${NAMESPACE}" \
                --values ./01-cluster.yaml \
                --wait --timeout 5m
        - assert:
            file: ./01-cluster-assert.yaml
      catch:
        - describe:
            apiVersion: postgresql.cnpg.io/v1
            kind: Cluster
        - describe:
            apiVersion: barmancloud.cnpg.io/v1
            kind: ObjectStore

    - name: Write pre-backup data
      try:
        - apply:
            file: ./02-data-write.yaml
        - assert:
            file: ./02-data-write-assert.yaml
      catch:
        - podLogs:
            selector: batch.kubernetes.io/job-name=data-write

    - name: On-demand backup + checkpoint
      try:
        - apply:
            file: ./03-backup.yaml
        - apply:
            file: ./03-checkpoint.yaml
        - assert:
            file: ./03-backup-assert.yaml
      catch:
        - describe:
            apiVersion: postgresql.cnpg.io/v1
            kind: Backup
        - podLogs:
            selector: batch.kubernetes.io/job-name=checkpoint

    - name: Write post-backup data
      try:
        - apply:
            file: ./04-post-backup-write.yaml
        - assert:
            file: ./04-post-backup-write-assert.yaml
      catch:
        - podLogs:
            selector: batch.kubernetes.io/job-name=post-backup-write

    - name: Recover from the Backup CR
      try:
        - script:
            content: |
              set -eu
              helm upgrade --install recovery-from-backup "${CHART_DIR}" \
                --namespace "${NAMESPACE}" \
                --values ./05-recovery-from-backup.yaml \
                --wait --timeout 8m
        - assert:
            file: ./05-recovery-from-backup-assert.yaml
      catch:
        - describe:
            apiVersion: postgresql.cnpg.io/v1
            kind: Cluster

    - name: Verify recovered-from-backup data
      try:
        - apply:
            file: ./06-recovery-data-check.yaml
        - assert:
            file: ./06-recovery-data-check-assert.yaml
      catch:
        - podLogs:
            selector: batch.kubernetes.io/job-name=recovery-from-backup-data-check

    - name: Recover from the ObjectStore
      try:
        - script:
            content: |
              set -eu
              "${CHART_DIR}/test/support/s3-secret.sh" "${NAMESPACE}" recovery-from-objectstore-cnpg-cluster-backup
              helm upgrade --install recovery-from-objectstore "${CHART_DIR}" \
                --namespace "${NAMESPACE}" \
                --values ./07-recovery-from-objectstore.yaml \
                --wait --timeout 8m
        - assert:
            file: ./07-recovery-from-objectstore-assert.yaml
      catch:
        - describe:
            apiVersion: postgresql.cnpg.io/v1
            kind: Cluster

    - name: Verify recovered-from-objectstore data
      try:
        - apply:
            file: ./08-recovery-data-check.yaml
        - assert:
            file: ./08-recovery-data-check-assert.yaml
      catch:
        - podLogs:
            selector: batch.kubernetes.io/job-name=recovery-from-objectstore-data-check
