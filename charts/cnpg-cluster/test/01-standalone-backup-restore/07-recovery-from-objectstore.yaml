mode: recovery

recovery:
  method: object_store
  objectStoreName: standalone-cnpg-cluster-backup
  clusterName: standalone-cnpg-cluster

cluster:
  instances: 1
  storage:
    size: 1Gi
    storageClass: standard
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

backups:
  enabled: false

monitoring:
  enabled: false
