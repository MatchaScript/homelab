mode: standalone

cluster:
  instances: 2
  # Tests run a CHECKPOINT Job against the *-superuser secret to make backup
  # completion deterministic; the secret is only generated when superuser
  # access is enabled.
  enableSuperuserAccess: true
  storage:
    size: 1Gi
    storageClass: standard
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

backups:
  enabled: true
  destinationPath: "s3://mybucket/standalone"
  endpointURL: "http://minio.minio.svc.cluster.local"
  s3CredentialsSecret: standalone-cnpg-cluster-backup
  retentionPolicy: "7d"
  wal:
    compression: gzip
    maxParallel: 2
  data:
    compression: gzip
    jobs: 2
  scheduledBackups: []

monitoring:
  enabled: false
