apiVersion: batch/v1
kind: Job
metadata:
  name: primary-checkpoint
spec:
  backoffLimit: 3
  template:
    metadata:
      name: primary-checkpoint
    spec:
      restartPolicy: Never
      containers:
        - name: psql
          image: ghcr.io/cloudnative-pg/postgresql:16
          env:
            - name: PGURI
              valueFrom:
                secretKeyRef:
                  name: primary-cnpg-cluster-superuser
                  key: uri
          command: ["bash", "-c"]
          args:
            - |
              set -eu
              psql "$PGURI" -c "CHECKPOINT;"
