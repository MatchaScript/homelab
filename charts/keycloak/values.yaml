# Default values for keycloak.

image:
  repository: quay.io/keycloak/keycloak
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

replicas: 1

# Use a dedicated user namespace for the pod (Kubernetes UserNamespaces feature).
# When true, sets `pod.spec.hostUsers: false`.
userNamespaces: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1024Mi

# External PostgreSQL connection.
# The chart no longer provisions a database. Provide an existing PostgreSQL
# endpoint and a Secret with credentials. CNPG-managed clusters auto-generate
# `<cluster>-app` secrets that fit this shape.
postgresql:
  # Required. e.g. "keycloak-db-rw"
  host: ""
  port: 5432
  database: keycloak
  # Required. Secret containing 'username' and 'password' keys.
  credentialsSecret: ""

# Bootstrap administrator credentials.
admin:
  username: admin
  # Required. Secret containing the key referenced by `bootstrapPasswordKey`.
  bootstrapSecret: ""
  bootstrapPasswordKey: keycloak-bootstrap-admin-password

hostname:
  # Public-facing hostname (frontchannel). e.g. "https://accounts.example.com"
  public: ""
  # Admin console hostname. e.g. "https://keycloak.example.com"
  admin: ""

# Infinispan/JGroups clustering. The headless Service used for DNS_PING
# discovery is always created and named `keycloak-service`.
cache:
  stack: kubernetes

ingress:
  enabled: true
  className: ""
  annotations: {}
  labels: {}
  # Hostnames; default to the host portion of `hostname.public` / `hostname.admin`
  # if left empty.
  publicHost: ""
  adminHost: ""
  tls:
    enabled: true
    secretName: ""
