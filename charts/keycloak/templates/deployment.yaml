{{- $dbSecret := required "postgresql.credentialsSecret is required" .Values.postgresql.credentialsSecret -}}
{{- $dbHost := required "postgresql.host is required" .Values.postgresql.host -}}
{{- $adminSecret := required "admin.bootstrapSecret is required" .Values.admin.bootstrapSecret -}}
{{- $publicHostname := required "hostname.public is required" .Values.hostname.public -}}
{{- $adminHostname := required "hostname.admin is required" .Values.hostname.admin -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "keycloak.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "keycloak.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.userNamespaces }}
      hostUsers: false
      {{- end }}
      containers:
        - name: keycloak
          image: {{ include "keycloak.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["start"]
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9000
              name: health
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.admin.username | quote }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $adminSecret }}
                  key: {{ .Values.admin.bootstrapPasswordKey }}
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://{{ $dbHost }}:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}"
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecret }}
                  key: username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecret }}
                  key: password
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_HOSTNAME
              value: {{ $publicHostname | quote }}
            - name: KC_HOSTNAME_ADMIN
              value: {{ $adminHostname | quote }}
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_CACHE_STACK
              value: {{ .Values.cache.stack | quote }}
            - name: JAVA_OPTS_APPEND
              value: "-Djgroups.dns.query=keycloak-service"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
