apiVersion: v1
kind: Service
metadata:
  name: keycloak-service
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  annotations:
    description: Headless service for JGroups DNS_PING clustering.
spec:
  clusterIP: None
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    {{- include "keycloak.selectorLabels" . | nindent 4 }}
