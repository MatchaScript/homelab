apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: bootstrap
spec:
  timeouts:
    apply: 30s
    assert: 8m
    cleanup: 2m
  steps:
    - name: Apply bootstrap-admin Secret
      try:
        - apply:
            file: ./00-bootstrap-secret.yaml

    - name: Install the cnpg-cluster + keycloak stack
      try:
        - script:
            content: |
              set -eu
              helm upgrade --install keycloak-db "${CHART_DIR}/../cnpg-cluster" \
                --namespace "${NAMESPACE}" \
                --values ./01-cnpg-values.yaml \
                --wait --timeout 8m
              helm upgrade --install keycloak "${CHART_DIR}" \
                --namespace "${NAMESPACE}" \
                --values ./01-keycloak-values.yaml \
                --wait --timeout 8m
        - assert:
            file: ./01-stack-assert.yaml
      catch:
        - describe:
            apiVersion: postgresql.cnpg.io/v1
            kind: Cluster
        - describe:
            apiVersion: apps/v1
            kind: Deployment
        - podLogs:
            selector: app=keycloak

    - name: Probe OIDC discovery via the keycloak-http Service
      try:
        - apply:
            file: ./02-discovery.yaml
        - assert:
            file: ./02-discovery-assert.yaml
      catch:
        - podLogs:
            selector: batch.kubernetes.io/job-name=oidc-discovery
        - podLogs:
            selector: app=keycloak
