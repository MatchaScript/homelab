apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Configuration
metadata:
  name: keycloak-tests
spec:
  parallel: 1
  timeouts:
    apply: 30s
    assert: 8m
    cleanup: 2m
    delete: 2m
    error: 30s
    exec: 5m
  failFast: false
  fullName: true
  namespaceTemplate:
    metadata:
      labels:
        test-suite: keycloak
