# Default values for powerdns.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: docker.io/powerdns/pdns-auth-50
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest@sha256:f626764557339d0b9d03e178e48a94641c707da8da2655cfa413b4d8cab2238b"

# Image used by the credentials init container. Needs sh + redirection only.
initContainer:
  image:
    repository: ghcr.io/matchascript/fedora
    tag: "micro@sha256:ccff476bcbc8890e5ef14b8f6e18135370c8151a91102c3297500ec565266c86"
    pullPolicy: IfNotPresent

# Image used by the init container that waits for the database TCP port to open.
# Requires `sh` and `nc`. busybox is a good default; override for air-gapped
# environments.
waitForDb:
  image:
    repository: docker.io/library/busybox
    tag: "1.37@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e"
    pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

# Kubernetes cluster domain
clusterDomain: cluster.local

service:
  type: ClusterIP
  # Set clusterIP to None to create a headless service
  # clusterIP: None
  port: 53
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector: {}

tolerations: []

affinity: {}

# External PostgreSQL connection.
# The chart no longer provisions a database. Provide an existing PostgreSQL
# endpoint and a Secret with credentials. The schema ConfigMap below can be
# referenced by an external bootstrapper (e.g. CNPG's
# bootstrap.initdb.postInitApplicationSQLRefs) to seed the schema.
postgresql:
  # Required. e.g. "my-db-rw.cnpg.svc"
  host: ""
  port: 5432
  # Database name PowerDNS will connect to.
  database: powerdns
  # Required. Secret containing 'username' and 'password' keys.
  # CNPG-managed clusters auto-generate <cluster>-app secrets that fit this shape.
  credentialsSecret: ""

  # Schema ConfigMap (PowerDNS PostgreSQL schema, ready for external bootstrappers).
  schemaConfigMap:
    create: true
    # SET ROLE statement prepended to schema.sql. Empty string disables it.
    role: powerdns

# PowerDNS ConfigMap settings (pdns.conf)
powerdns:
  # Secret name containing 'api-key' and 'webserver-password' keys.
  # If set, these are injected via init-container.
  appCredentialsSecret: ""

  # Additional configuration appended to pdns.conf
  # Note: local-port=5353 is set in the base configmap by default
  config: |
    # Any custom pdns.conf parameters can go here
    log-dns-details=yes
    log-dns-queries=yes
    loglevel=4

# PowerDNS Recursor Settings
recursor:
  enabled: false
  replicaCount: 1
  image:
    repository: docker.io/powerdns/pdns-recursor-51
    pullPolicy: IfNotPresent
    tag: "latest@sha256:8b726b17f97c4bf3cf1c7b357951e2552cd8a813e1de39aa5e10db5a9753c61b"
  service:
    type: ClusterIP
    port: 53
    annotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Recursor config in YAML format (required by pdns-recursor 5.x)
  config: |
    incoming:
      listen:
        - 0.0.0.0:5353
    logging:
      common_errors: true

# DNSDist Settings
dnsdist:
  enabled: false
  replicaCount: 1
  image:
    repository: docker.io/powerdns/dnsdist-21
    pullPolicy: IfNotPresent
    tag: "latest@sha256:d30076121ce424f056770318da266d55998fea1c4982d6de3b4e050c2652329e"
  service:
    type: ClusterIP
    # Note: If dnsdist is exposed with a LoadBalancer, this usually becomes LoadBalancer.
    port: 53
    annotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # config: Optional custom dnsdist.conf content
  # If not set, the template auto-generates config with correct service names:
  #   setLocal("0.0.0.0:5353")
  #   newServer({address="<fullname>:5353", pool="auth"})
  #   newServer({address="<fullname>-recursor:5353", pool="recursor"})  # if recursor enabled
