{{- if .Values.recursor.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "powerdns.fullname" . }}-recursor
  labels:
    {{- include "powerdns.recursor.labels" . | nindent 4 }}
  {{- with .Values.recursor.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.recursor.service.type }}
  {{- if eq .Values.recursor.service.type "ClusterIP" }}
  {{- if .Values.recursor.service.clusterIP }}
  clusterIP: {{ .Values.recursor.service.clusterIP }}
  {{- end }}
  {{- end }}
  ports:
    - port: {{ .Values.recursor.service.port }}
      targetPort: dns-tcp
      protocol: TCP
      name: dns-tcp
    - port: {{ .Values.recursor.service.port }}
      targetPort: dns-udp
      protocol: UDP
      name: dns-udp
  selector:
    {{- include "powerdns.recursor.selectorLabels" . | nindent 4 }}
{{- end }}
