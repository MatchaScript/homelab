# Test values for PowerDNS deployment

powerdns:
  config: |
    log-dns-details=yes
    log-dns-queries=yes
    loglevel=4
    # Webserver and API
    api=yes
    webserver=yes
    webserver-address=0.0.0.0
    webserver-port=8081
    webserver-allow-from=0.0.0.0/0

postgresql:
  host: "test-db.example.svc"
  credentialsSecret: "test-db-creds"

recursor:
  enabled: true
  config: |
    incoming:
      listen:
        - 0.0.0.0:5353
    logging:
      common_errors: true

dnsdist:
  enabled: true
  # config is auto-generated by the template with correct service names
