replicaCount: 1

postgresql:
  host: pdns-db-cnpg-cluster-rw
  port: 5432
  database: powerdns
  credentialsSecret: pdns-db-cnpg-cluster-app
  schemaConfigMap:
    create: true
    role: powerdns

powerdns:
  appCredentialsSecret: pdns-app
  config: |
    api=yes
    webserver=yes
    webserver-address=0.0.0.0
    webserver-port=8081
    webserver-allow-from=0.0.0.0/0
    log-dns-details=yes
    log-dns-queries=yes
    loglevel=6
    cache-ttl=0
    negquery-cache-ttl=0
    query-cache-ttl=0
    zone-cache-refresh-interval=0

resources:
  requests:
    cpu: 50m
    memory: 64Mi
