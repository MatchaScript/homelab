{{- if .Values.httpRoute.enabled }}
{{- if not .Values.httpRoute.parentRef.name }}{{ fail "httpRoute.parentRef.name is required when httpRoute.enabled=true" }}{{ end -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "opencloud.fullname" . }}
  namespace: {{ include "opencloud.namespace" . }}
  labels:
    {{- include "opencloud.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.parentRef.name }}
      {{- with .Values.httpRoute.parentRef.namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .Values.httpRoute.parentRef.sectionName }}
      sectionName: {{ . }}
      {{- end }}
  hostnames:
    {{- if .Values.httpRoute.hostnames }}
    {{- toYaml .Values.httpRoute.hostnames | nindent 4 }}
    {{- else }}
    - {{ .Values.host | quote }}
    {{- end }}
  rules:
    - backendRefs:
        - name: {{ include "opencloud.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
