{{- if not .Values.host }}{{ fail "host is required" }}{{ end -}}
{{- if not .Values.admin.existingSecret }}{{ fail "admin.existingSecret is required" }}{{ end -}}
{{- if not .Values.oidc.issuer }}{{ fail "oidc.issuer is required" }}{{ end -}}
{{- if not .Values.s3.endpoint }}{{ fail "s3.endpoint is required" }}{{ end -}}
{{- if not .Values.s3.existingSecret }}{{ fail "s3.existingSecret is required" }}{{ end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencloud.fullname" . }}
  namespace: {{ include "opencloud.namespace" . }}
  labels:
    {{- include "opencloud.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "opencloud.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "opencloud.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: opencloud
          image: {{ include "opencloud.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["/bin/sh"]
          args: ["-c", "opencloud init || true; opencloud server"]
          env:
            - name: OC_URL
              value: {{ printf "https://%s" .Values.host | quote }}
            - name: OC_LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: OC_LOG_COLOR
              value: {{ .Values.logColor | quote }}
            - name: OC_LOG_PRETTY
              value: {{ .Values.logPretty | quote }}
            - name: OC_INSECURE
              value: {{ .Values.insecure | quote }}
            - name: PROXY_TLS
              value: "false"
            - name: PROXY_ENABLE_BASIC_AUTH
              value: "false"
            - name: GATEWAY_GRPC_ADDR
              value: "0.0.0.0:9142"
            - name: OC_SHARING_PUBLIC_SHARE_MUST_HAVE_PASSWORD
              value: "false"
            - name: OC_PASSWORD_POLICY_BANNED_PASSWORDS_LIST
              value: "banned-password-list.txt"
            - name: OC_GRPC_MAX_RECEIVED_MESSAGE_SIZE
              value: "102400000"
            - name: PROXY_CSP_CONFIG_FILE_LOCATION
              value: "/etc/opencloud/csp.yaml"
            - name: GRAPH_AVAILABLE_ROLES
              value: "b1e2218d-eef8-4d4c-b82d-0f1a1b48f3b5,a8d5fe5e-96e3-418d-825b-534dbdf22b99,fb6c3e19-e378-47e5-b277-9732f9de6e21,58c63c02-1d89-4572-916a-870abc5a1b7d,2d00ce52-1fc2-4dbc-8b95-a73b73395f5a,1c996275-f1c9-4e71-abdf-a42f6495e960,312c0871-5ef7-4b3a-85b6-0e4074c64049,aa97fe03-7980-45ac-9e50-b325749fd7e6"
            {{- with .Values.additionalServices }}
            - name: OC_ADD_RUN_SERVICES
              value: {{ join "," . | quote }}
            {{- end }}
            {{- $exclude := include "opencloud.excludeServices" . }}
            {{- if $exclude }}
            - name: OC_EXCLUDE_RUN_SERVICES
              value: {{ $exclude | quote }}
            {{- end }}

            # Admin password
            - name: IDM_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.admin.existingSecret | quote }}
                  key: adminPassword
            - name: IDM_CREATE_DEMO_USERS
              value: {{ .Values.createDemoUsers | quote }}

            # External OIDC
            - name: PROXY_AUTOPROVISION_ACCOUNTS
              value: "true"
            - name: FRONTEND_READONLY_USER_ATTRIBUTES
              value: "user.onPremisesSamAccountName,user.displayName,user.mail,user.passwordProfile,user.accountEnabled,user.appRoleAssignments"
            - name: PROXY_ROLE_ASSIGNMENT_DRIVER
              value: "oidc"
            - name: PROXY_ROLE_ASSIGNMENT_OIDC_CLAIM
              value: "roles"
            - name: PROXY_OIDC_ACCESS_TOKEN_VERIFY_METHOD
              value: "jwt"
            - name: PROXY_OIDC_REWRITE_WELLKNOWN
              value: "true"
            - name: PROXY_USER_OIDC_CLAIM
              value: {{ .Values.oidc.userClaim | quote }}
            - name: PROXY_USER_CS3_CLAIM
              value: "username"
            - name: OC_OIDC_ISSUER
              value: {{ .Values.oidc.issuer | quote }}
            - name: WEB_OIDC_CLIENT_ID
              value: {{ .Values.oidc.clientId | quote }}
            - name: WEB_OIDC_METADATA_URL
              value: {{ printf "%s/.well-known/openid-configuration" .Values.oidc.issuer | quote }}
            - name: WEB_OIDC_SCOPE
              value: {{ .Values.oidc.scope | quote }}
            - name: WEB_OPTION_ACCOUNT_EDIT_LINK_HREF
              value: {{ required "oidc.accountUrl is required" .Values.oidc.accountUrl | quote }}
            - name: OC_ADMIN_USER_ID
              value: ""
            - name: GRAPH_ASSIGN_DEFAULT_USER_ROLE
              value: "false"
            - name: GRAPH_USERNAME_MATCH
              value: "none"

            # NATS / service registry
            - name: MICRO_REGISTRY_ADDRESS
              value: {{ include "opencloud.natsEndpoint" . | quote }}
            {{- if .Values.nats.external.enabled }}
            - name: OC_CACHE_STORE_NODES
              value: {{ .Values.nats.external.endpoint | quote }}
            - name: OC_PERSISTENT_STORE_NODES
              value: {{ .Values.nats.external.endpoint | quote }}
            - name: OC_EVENTS_ENDPOINT
              value: {{ .Values.nats.external.endpoint | quote }}
            - name: OC_EVENTS_CLUSTER
              value: {{ .Values.nats.external.cluster | quote }}
            - name: OC_EVENTS_ENABLE_TLS
              value: {{ .Values.nats.external.tls.enabled | quote }}
            - name: OC_EVENTS_TLS_INSECURE
              value: {{ .Values.nats.external.tls.insecure | quote }}
            {{- if not .Values.nats.external.tls.certTrusted }}
            - name: OC_EVENTS_TLS_ROOT_CA_CERTIFICATE
              value: /etc/opencloud/nats-ca/ca.crt
            {{- end }}
            {{- else }}
            - name: NATS_NATS_HOST
              value: "0.0.0.0"
            - name: NATS_NATS_PORT
              value: "9233"
            {{- end }}

            # Storage (decomposeds3 — external S3 only)
            - name: STORAGE_USERS_DRIVER
              value: "decomposeds3"
            - name: STORAGE_SYSTEM_DRIVER
              value: "decomposed"
            - name: STORAGE_USERS_DECOMPOSEDS3_ENDPOINT
              value: {{ .Values.s3.endpoint | quote }}
            - name: STORAGE_USERS_DECOMPOSEDS3_REGION
              value: {{ .Values.s3.region | quote }}
            - name: STORAGE_USERS_DECOMPOSEDS3_BUCKET
              value: {{ .Values.s3.bucket | quote }}
            - name: STORAGE_USERS_DECOMPOSEDS3_CREATE_BUCKET
              value: {{ .Values.s3.createBucket | quote }}
            - name: STORAGE_USERS_DECOMPOSEDS3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecret | quote }}
                  key: accessKey
            - name: STORAGE_USERS_DECOMPOSEDS3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecret | quote }}
                  key: secretKey

            # Search (external Tika, optional)
            {{- if .Values.tika.url }}
            - name: SEARCH_EXTRACTOR_TYPE
              value: "tika"
            - name: SEARCH_EXTRACTOR_TIKA_TIKA_URL
              value: {{ .Values.tika.url | quote }}
            {{- end }}

            # SMTP (optional)
            {{- if .Values.smtp.enabled }}
            - name: NOTIFICATIONS_SMTP_HOST
              value: {{ .Values.smtp.host | quote }}
            - name: NOTIFICATIONS_SMTP_PORT
              value: {{ .Values.smtp.port | quote }}
            - name: NOTIFICATIONS_SMTP_SENDER
              value: {{ default (printf "OpenCloud <notifications@%s>" .Values.host) .Values.smtp.sender | quote }}
            - name: NOTIFICATIONS_SMTP_INSECURE
              value: {{ .Values.smtp.insecure | quote }}
            - name: NOTIFICATIONS_SMTP_AUTHENTICATION
              value: {{ .Values.smtp.authentication | quote }}
            - name: NOTIFICATIONS_SMTP_ENCRYPTION
              value: {{ .Values.smtp.encryption | quote }}
            - name: NOTIFICATIONS_SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ required "smtp.existingSecret is required when smtp.enabled=true" .Values.smtp.existingSecret | quote }}
                  key: smtpUser
            - name: NOTIFICATIONS_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.smtp.existingSecret | quote }}
                  key: smtpPassword
            {{- end }}

            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 9200
            - name: nats
              containerPort: 9233
          startupProbe:
            httpGet:
              path: /health
              port: 9200
            periodSeconds: 2
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 9200
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 9200
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/opencloud
            - name: data
              mountPath: /var/lib/opencloud
            - name: config-files
              mountPath: /etc/opencloud/app-registry.yaml
              subPath: app-registry.yaml
            - name: config-files
              mountPath: /etc/opencloud/csp.yaml
              subPath: csp.yaml
            - name: config-files
              mountPath: /etc/opencloud/search.yaml
              subPath: search.yaml
            - name: config-files
              mountPath: /etc/opencloud/banned-password-list.txt
              subPath: banned-password-list.txt
            - name: config-files
              mountPath: /var/lib/opencloud/config.json
              subPath: config.json
            {{- if and .Values.nats.external.enabled (not .Values.nats.external.tls.certTrusted) }}
            - name: nats-ca
              mountPath: /etc/opencloud/nats-ca
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          {{- if .Values.persistence.config.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-config" (include "opencloud.fullname" .)) .Values.persistence.config.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: data
          {{- if .Values.persistence.data.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-data" (include "opencloud.fullname" .)) .Values.persistence.data.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config-files
          configMap:
            name: {{ include "opencloud.fullname" . }}-config
        {{- if and .Values.nats.external.enabled (not .Values.nats.external.tls.certTrusted) }}
        - name: nats-ca
          secret:
            secretName: {{ required "nats.external.tls.caSecretName is required when certTrusted=false" .Values.nats.external.tls.caSecretName }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
