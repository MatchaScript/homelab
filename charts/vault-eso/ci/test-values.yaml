# Values used by `helm lint` in CI. Exercises the templated paths
# (SecretStore + ServiceAccount + a small ExternalSecret block) without
# requiring a live cluster.

secretStore:
  enabled: true
  name: vault
  vault:
    server: "http://vault.vault.svc:8200"
    namespace: ""
    path: secret
    version: v2
    auth:
      mountPath: kubernetes
      role: lint-role

externalSecrets:
  - name: lint-secret
    refreshInterval: 1h
    creationPolicy: Owner
    data:
      - secretKey: password
        remoteRef:
          key: services/lint/credentials
          property: password

  - name: lint-templated-secret
    refreshInterval: 30m
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/basic-auth
      mergePolicy: Replace
      metadata:
        labels:
          app: lint
        annotations:
          example.com/owner: lint
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
    data:
      - secretKey: username
        remoteRef:
          key: services/lint/credentials
          property: username
      - secretKey: password
        remoteRef:
          key: services/lint/credentials
          property: password
