---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: basic-auth-creds
status:
  conditions:
    - type: Ready
      status: "True"
---
# base64('alice')   == YWxpY2U=
# base64('hunter2') == aHVudGVyMg==
apiVersion: v1
kind: Secret
metadata:
  name: basic-auth-creds
  labels:
    example.com/auth-flavour: basic
  annotations:
    example.com/source: vault-eso-test
type: kubernetes.io/basic-auth
data:
  username: YWxpY2U=
  password: aHVudGVyMg==
