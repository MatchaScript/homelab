apiVersion: "monitoring.coreos.com/v1"
kind: "PrometheusRule"
metadata:
  labels:
    app.kubernetes.io/managed-by: "argocd"
    app.kubernetes.io/part-of: "kubernetes-mixin"
  name: "kubernetes-mixin-kubernetes-system-controller-manager"
spec:
  groups:
  - name: "kubernetes-system-controller-manager"
    rules:
    - alert: "KubeControllerManagerDown"
      annotations:
        description: "KubeControllerManager has disappeared from Prometheus target discovery."
        runbook_url: "https://github.com/kubernetes-monitoring/kubernetes-mixin/tree/master/runbook.md#alert-name-kubecontrollermanagerdown"
        summary: "Target disappeared from Prometheus target discovery."
      expr: |
        absent(up{job="kube-controller-manager"})
      for: "15m"
      labels:
        severity: "critical"
    - alert: "KubeControllerManagerInstanceUnreachable"
      annotations:
        description: "A KubeControllerManager instance has been unreachable for more than 15 minutes."
        runbook_url: "https://github.com/kubernetes-monitoring/kubernetes-mixin/tree/master/runbook.md#alert-name-kubecontrollermanagerinstanceunreachable"
        summary: "KubeControllerManager instance is unreachable."
      expr: |
        up{job="kube-controller-manager"} == 0
      for: "15m"
      labels:
        severity: "warning"
