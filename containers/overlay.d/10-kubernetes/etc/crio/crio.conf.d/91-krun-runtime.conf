# krun: crun + libkrun microVM handler (Fedora crun-krun).
# Selected by RuntimeClass handler "krun".
#
# krun.* pod annotations (krun.nested_virt, krun.cpus, krun.ram_mib) pass
# through to the OCI spec automatically: CRI-O only filters annotations it
# recognizes, and krun.* is not among them. Do NOT add krun.* to
# allowed_annotations -- CRI-O rejects unknown values there and fails to
# start. Leaving "run.oci." un-allowed also strips run.oci.handler,
# avoiding libkrun's "override already configured global handler" error.
#
# /dev/kvm is injected by the krun handler itself (crun
# src/libcrun/handlers/krun.c); no device annotation or plugin needed.
[crio.runtime.runtimes.krun]
runtime_path = "/usr/bin/krun"
runtime_type = "oci"
runtime_root = "/run/krun"
monitor_path = "/usr/libexec/crio/conmon"
# Privileged krun pods must not inherit every host device node into the
# microVM; kvm is added by the handler regardless.
privileged_without_host_devices = true
